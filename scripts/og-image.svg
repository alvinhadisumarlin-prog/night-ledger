<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="vig" cx="50%" cy="38%" r="75%">
      <stop offset="40%" stop-color="#0b0a0c" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8f6f31" stop-opacity="0"/>
      <stop offset="25%" stop-color="#8f6f31"/>
      <stop offset="50%" stop-color="#d9a441"/>
      <stop offset="75%" stop-color="#8f6f31"/>
      <stop offset="100%" stop-color="#8f6f31" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0b0a0c"/>
  <rect width="1200" height="630" fill="url(#vig)"/>
  <rect x="24" y="24" width="1152" height="582" rx="6" fill="none" stroke="#241d2b" stroke-width="1.5"/>

  <text x="600" y="150" text-anchor="middle" fill="#8f6f31"
        font-family="'IBM Plex Mono',monospace" font-size="22" letter-spacing="11">A PRIVATE COMPENDIUM</text>

  <g filter="url(#glow)">
    <path d="M600 196 L640 250 L600 304 L560 250 Z" fill="#d9a441" opacity="0.22"/>
    <path d="M600 214 L626 250 L600 286 L574 250 Z" fill="#d9a441"/>
    <path d="M600 228 L613 250 L600 272 L587 250 Z" fill="#8f2222"/>
  </g>

  <text x="600" y="410" text-anchor="middle" fill="#e8e2d4"
        font-family="'Cinzel','Times New Roman',serif" font-weight="700" font-size="104" letter-spacing="4">The Night Ledger</text>

  <rect x="450" y="452" width="300" height="2" fill="url(#ember)"/>

  <text x="600" y="520" text-anchor="middle" fill="#7a7280"
        font-family="'Spectral',Georgia,serif" font-style="italic" font-size="30">Hauntings, creatures, and uneasy ground of</text>
  <text x="600" y="560" text-anchor="middle" fill="#7a7280"
        font-family="'Spectral',Georgia,serif" font-style="italic" font-size="30">Southeast &amp; East Asia — collected, catalogued, kept.</text>
</svg>
